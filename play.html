<body>

<div id="loading">Loading scene…</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const ASSETS = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples';

// ============================================================
// 1. RENDERER
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ============================================================
// 2. SCENE + FOG
// ============================================================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x9bc4e2, 200, 900);

// ============================================================
// 3. CAMERA
// ============================================================
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 18, 22);

// ============================================================
// 4. ORBIT CONTROLS
// ============================================================
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.maxPolarAngle = Math.PI * 0.49;
controls.minDistance = 8;
controls.maxDistance = 70;

// ============================================================
// 5. SKYBOX
// ============================================================
const USE_PANORAMA = false;
const PANORAMA_URL  = './ucsc.jpg';
const CUBE = 'SwedishRoyalCastle';

let skybox;
function onSky() { document.getElementById('loading').style.display = 'none'; }
function skyFail() { scene.background = new THREE.Color(0x87b6e8); }

if (USE_PANORAMA) {
  skybox = new THREE.TextureLoader().load(PANORAMA_URL, (tex) => {
    tex.mapping = THREE.EquirectangularReflectionMapping;
    tex.colorSpace = THREE.SRGBColorSpace;
    scene.background = tex; scene.environment = tex; onSky();
  }, undefined, skyFail);
} else {
  const cubeLoader = new THREE.CubeTextureLoader();
  cubeLoader.setPath(`${ASSETS}/textures/cube/${CUBE}/`);
  skybox = cubeLoader.load(
    ['px.jpg', 'nx.jpg', 'py.jpg', 'ny.jpg', 'pz.jpg', 'nz.jpg'],
    onSky, undefined, skyFail
  );
  skybox.colorSpace = THREE.SRGBColorSpace;
  scene.background = skybox;
  scene.environment = skybox;
}

// ============================================================
// 6. LIGHTS
// ============================================================
const ambient = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambient);
const hemi = new THREE.HemisphereLight(0xbfd9ff, 0x4a6b2a, 0.6);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 2.6);
sun.position.set(30, 50, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, { near: 1, far: 200, left: -70, right: 70, top: 70, bottom: -70 });
scene.add(sun); scene.add(sun.target);
const pointLamp = new THREE.PointLight(0xffaa55, 0, 60);
pointLamp.position.set(0, 12, 0);
scene.add(pointLamp);
const spot = new THREE.SpotLight(0xfff4d6, 60, 70, Math.PI / 6, 0.4, 1);
spot.castShadow = true;
spot.shadow.mapSize.set(1024, 1024);
scene.add(spot); scene.add(spot.target);

// ============================================================
// 7. TEXTURED GROUND
// ============================================================
const texLoader = new THREE.TextureLoader();
const grass = texLoader.load(`${ASSETS}/textures/terrain/grasslight-big.jpg`);
grass.colorSpace = THREE.SRGBColorSpace;
grass.wrapS = grass.wrapT = THREE.RepeatWrapping;
grass.repeat.set(60, 60);
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(600, 600),
  new THREE.MeshStandardMaterial({ map: grass })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const crateTex = texLoader.load(`${ASSETS}/textures/crate.gif`);
crateTex.colorSpace = THREE.SRGBColorSpace;
const wallMat = new THREE.MeshStandardMaterial({ map: crateTex });

// ============================================================
// 8. MAZE GENERATION
// ============================================================
const CELL = 4;
const WALL_H = 3;
const TODAY = new Date();
const DAILY_SEED = Math.floor(Date.now() / 86400000);
const GHOST_KEY = `ratrace_ghost_v2_${DAILY_SEED}`;

const LEVELS = {
  easy:   { cw: 6, ch: 6, par: 25, label: 'Easy',   seed: DAILY_SEED,       cheeseCount: 7  },
  medium: { cw: 6, ch: 6, par: 30, label: 'Medium', seed: DAILY_SEED + 1,   cheeseCount: 14 },
  hard:   { cw: 6, ch: 6, par: 40, label: 'Hard',   seed: DAILY_SEED + 2,   cheeseCount: 14 },
};

let levelKey = 'easy';
let CW = LEVELS.easy.cw, CH = LEVELS.easy.ch, par = LEVELS.easy.par;
let GW, GH, grid;

function makeRNG(seed) {
  let s = seed >>> 0;
  return function () {
    s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const wallGeo = new THREE.BoxGeometry(CELL, WALL_H, CELL);
let mazeGroup = new THREE.Group();
scene.add(mazeGroup);

const toWorldX = (c) => (c - (GW - 1) / 2) * CELL;
const toWorldZ = (r) => (r - (GH - 1) / 2) * CELL;
const toCol = (x) => Math.round(x / CELL + (GW - 1) / 2);
const toRow = (z) => Math.round(z / CELL + (GH - 1) / 2);

function isWall(x, z) {
  const c = toCol(x), r = toRow(z);
  if (r < 0 || r >= GH || c < 0 || c >= GW) return true;
  return grid[r][c];
}
function blocked(x, z) {
  const rad = 1.1;
  return isWall(x + rad, z + rad) || isWall(x - rad, z + rad) ||
         isWall(x + rad, z - rad) || isWall(x - rad, z - rad);
}

let startPos = new THREE.Vector3();
let finishPos = new THREE.Vector3();
let finishGate;

function generateMaze() {
  const rand = makeRNG(LEVELS[levelKey].seed);
  GW = 2 * CW + 1; GH = 2 * CH + 1;
  grid = Array.from({ length: GH }, () => Array(GW).fill(true));
  const stack = [[1, 1]]; grid[1][1] = false;
  const dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]];
  while (stack.length) {
    const [r, c] = stack[stack.length - 1];
    const opts = [];
    for (const [dr, dc] of dirs) {
      const nr = r + dr, nc = c + dc;
      if (nr > 0 && nr < GH - 1 && nc > 0 && nc < GW - 1 && grid[nr][nc]) opts.push([nr, nc, dr, dc]);
    }
    if (opts.length) {
      const [nr, nc, dr, dc] = opts[(rand() * opts.length) | 0];
      grid[r + dr / 2][c + dc / 2] = false; grid[nr][nc] = false;
      stack.push([nr, nc]);
    } else stack.pop();
  }

  scene.remove(mazeGroup);
  mazeGroup = new THREE.Group();
  for (let r = 0; r < GH; r++) for (let c = 0; c < GW; c++) {
    if (grid[r][c]) {
      const w = new THREE.Mesh(wallGeo, wallMat);
      w.position.set(toWorldX(c), WALL_H / 2, toWorldZ(r));
      w.receiveShadow = true;
      mazeGroup.add(w);
    }
  }
  scene.add(mazeGroup);

  startPos.set(toWorldX(1), 0.9, toWorldZ(1));
  finishPos.set(toWorldX(GW - 2), 0.9, toWorldZ(GH - 2));

  if (finishGate) scene.remove(finishGate);
  finishGate = new THREE.Mesh(
    new THREE.TorusGeometry(1.6, 0.3, 16, 40),
    new THREE.MeshStandardMaterial({ color: 0x33ff88, emissive: 0x0a5530, metalness: 0.4 })
  );
  finishGate.position.set(finishPos.x, 2, finishPos.z);
  finishGate.rotation.x = Math.PI / 2;
  scene.add(finishGate);

  spawnCheese();
}

const rat = new THREE.Group();
scene.add(rat);

// ============================================================
// 9. MODEL CONSTANTS  (declared here so ghost loader can use them)
// ============================================================
const MODEL_URL   = './rat.glb';
const MODEL_SCALE = 1;
const MODEL_Y     = 0;
const MODEL_FACE  = 0;

// ============================================================
// GHOST RAT
// ============================================================
const ghostHud = document.getElementById('ghosthud');
const ghostRat = new THREE.Group();
ghostRat.visible = false;
scene.add(ghostRat);

new GLTFLoader().load(MODEL_URL, (gltf) => {
  const model = gltf.scene;
  model.scale.setScalar(MODEL_SCALE);
  model.rotation.y = MODEL_FACE;
  model.position.y = MODEL_Y;
  model.traverse((o) => {
    if (o.isMesh) {
      if (Array.isArray(o.material)) {
        o.material = o.material.map((m) => {
          const g = m.clone();
          g.transparent = true; g.opacity = 0.35;
          g.depthWrite = false; g.side = THREE.DoubleSide;
          return g;
        });
      } else {
        o.material = o.material.clone();
        o.material.transparent = true; o.material.opacity = 0.35;
        o.material.depthWrite = false; o.material.side = THREE.DoubleSide;
      }
    }
  });
  ghostRat.add(model);
}, undefined, () => {
  const fallback = new THREE.Mesh(
    new THREE.SphereGeometry(0.6, 12, 12),
    new THREE.MeshStandardMaterial({ color: 0xaaddff, transparent: true, opacity: 0.35, depthWrite: false })
  );
  ghostRat.add(fallback);
});

let ghostOn = true;
let currentRun = [];
let ghostRecording = null;
let ghostBestTime = null;

function ghostKey(lvl) { return `${GHOST_KEY}_${lvl}`; }

function loadGhost(lvl) {
  try {
    const raw = localStorage.getItem(ghostKey(lvl));
    if (!raw) { ghostRecording = null; ghostBestTime = null; return; }
    const data = JSON.parse(raw);
    ghostRecording = data.frames;
    ghostBestTime = data.time;
  } catch { ghostRecording = null; ghostBestTime = null; }
}

function saveGhost(lvl, time, frames) {
  try { localStorage.setItem(ghostKey(lvl), JSON.stringify({ time, frames })); }
  catch (e) { console.warn('ghost save failed', e); }
}

function updateGhostHud() {
  if (!ghostOn) { ghostHud.textContent = ''; return; }
  ghostHud.textContent = ghostBestTime !== null ? `Ghost: ${ghostBestTime.toFixed(1)}s` : 'Ghost: no best yet';
}

function tickGhost(t) {
  if (!ghostOn || !ghostRecording || ghostRecording.length < 2) {
    ghostRat.visible = false; return;
  }
  ghostRat.visible = true;
  let lo = 0, hi = ghostRecording.length - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (ghostRecording[mid].t <= t) lo = mid; else hi = mid;
  }
  const a = ghostRecording[lo], b = ghostRecording[hi];
  const span = b.t - a.t;
  const alpha = span > 0 ? (t - a.t) / span : 0;
  ghostRat.position.x = a.x + (b.x - a.x) * alpha;
  ghostRat.position.z = a.z + (b.z - a.z) * alpha;
  ghostRat.position.y = 0.9;
  let dyaw = b.yaw - a.yaw;
  if (dyaw >  Math.PI) dyaw -= Math.PI * 2;
  if (dyaw < -Math.PI) dyaw += Math.PI * 2;
  ghostRat.rotation.y = a.yaw + dyaw * alpha;
}

// ============================================================
// 10. CHEESE COLLECTIBLES
// ============================================================
const CHEESE_URL   = './cheese.glb';
const CHEESE_SCALE = 1;
const CHEESE_Y     = 1;
const cheeseMat = new THREE.MeshStandardMaterial({ color: 0xffd21e, roughness: 0.5, emissive: 0x3a2a00 });
const cheeseGeo = new THREE.BoxGeometry(0.9, 0.9, 0.9);
const cheeses = [];
let cheeseTemplate = null;
const CHEESE_GLOW = 0.18;
const cheeseMats = [];

function spawnCheese() {
  for (const c of cheeses) scene.remove(c);
  cheeses.length = 0;
  const count = Math.min(LEVELS[levelKey].cheeseCount, 99);

  if (levelKey === 'hard') {
    // BFS from start to get distance of every cell
    const dist = Array.from({ length: GH }, () => Array(GW).fill(-1));
    const queue = [[1, 1]];
    dist[1][1] = 0;
    while (queue.length) {
      const [r, c] = queue.shift();
      for (const [dr, dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
        const nr = r+dr, nc = c+dc;
        if (nr>=0 && nr<GH && nc>=0 && nc<GW && !grid[nr][nc] && dist[nr][nc]===-1) {
          dist[nr][nc] = dist[r][c] + 1;
          queue.push([nr, nc]);
        }
      }
    }
    // Count open neighbours to find dead ends (only 1 open neighbour = dead end)
    const open = [];
    for (let r = 1; r < GH-1; r++) for (let c = 1; c < GW-1; c++) {
      if (grid[r][c] || (r===1&&c===1) || (r===GH-2&&c===GW-2) || dist[r][c]===-1) continue;
      let openNeighbours = 0;
      for (const [dr, dc] of [[0,1],[0,-1],[1,0],[-1,0]])
        if (!grid[r+dr][c+dc]) openNeighbours++;
      open.push({ r, c, d: dist[r][c], dead: openNeighbours === 1 });
    }
    // Sort by distance, then pick every Nth cell so cheese spreads across whole maze
    open.sort((a, b) => b.d - a.d);
    const step = Math.ceil(open.length / count);
    const chosen = [];
    for (let i = 0; i < open.length && chosen.length < count; i += Math.max(1, step)) {
      chosen.push(open[i]);
    }
    // Fill remaining slots from anywhere not already chosen
    if (chosen.length < count) {
      for (const cell of open) {
        if (chosen.length >= count) break;
        if (!chosen.includes(cell)) chosen.push(cell);
      }
    }
    for (const { r, c } of chosen) placeCheeseAt(r, c);
    
  } else {
    // Easy + medium: same natural random placement as original
    const open = [];
    for (let r = 1; r < GH - 1; r++) for (let c = 1; c < GW - 1; c++)
      if (!grid[r][c] && !(r === 1 && c === 1) && !(r === GH - 2 && c === GW - 2)) open.push([r, c]);
    const crand = makeRNG(LEVELS[levelKey].seed + 777);
    for (let i = open.length - 1; i > 0; i--) { const j = (crand() * (i + 1)) | 0; [open[i], open[j]] = [open[j], open[i]]; }
    for (let i = 0; i < Math.min(count, open.length); i++) {
      const [r, c] = open[i];
      placeCheeseAt(r, c);
    }
  }
  total = cheeses.length;
}

function placeCheeseAt(r, c) {
  let item;
  if (cheeseTemplate) {
    item = cheeseTemplate.clone(true);
    item.scale.setScalar(CHEESE_SCALE);
    item.traverse((o) => { if (o.isMesh) o.castShadow = true; });
  } else {
    item = new THREE.Mesh(cheeseGeo, cheeseMat);
    item.castShadow = true;
  }
  item.position.set(toWorldX(c), CHEESE_Y, toWorldZ(r));
  item.userData.phase = Math.random() * Math.PI * 2;
  item.userData.baseY = CHEESE_Y;
  scene.add(item); cheeses.push(item);
}

new GLTFLoader().load(CHEESE_URL, (g) => {
  cheeseTemplate = g.scene;
  cheeseTemplate.traverse((o) => {
    if (o.isMesh && o.material) {
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      mats.forEach((m) => {
        if (m.color) m.color.lerp(new THREE.Color(0xffffff), 0.18);
        if ('emissive' in m) { m.emissive = m.color.clone(); m.emissiveIntensity = nightMode ? 0 : CHEESE_GLOW; }
        cheeseMats.push(m);
      });
    }
  });
  spawnCheese();
}, undefined, (e) => console.error('Cheese model failed (using cubes):', e));

// ============================================================
// 11. PLAYER RAT MODEL
// ============================================================
new GLTFLoader().load(MODEL_URL, (gltf) => {
  const model = gltf.scene;
  model.scale.setScalar(MODEL_SCALE);
  model.rotation.y = MODEL_FACE;
  model.position.y = MODEL_Y;
  model.traverse((o) => {
    if (o.isMesh) {
      o.castShadow = true;
      const mats = Array.isArray(o.material) ? o.material : [o.material];
      mats.forEach((m) => { if (m) m.side = THREE.DoubleSide; });
    }
  });
  rat.add(model);
}, undefined, (e) => console.error('Model load failed (is rat.glb next to index.html?):', e));

// ============================================================
// 12. HUD + BUTTONS
// ============================================================
let collected = 0, total = 0, raceTime = 0, finished = false, started = false;
const hud = document.getElementById('hud');
const winEl = document.getElementById('win');
const gateHint = document.getElementById('gatehint');
function updateHUD() {
  hud.textContent = `🧀 ${collected}/${total}  |  ⏱ ${raceTime.toFixed(1)}s`;
}

let dayNightOn = false, nightMode = false, minimapOn = true, followCam = true, savedCamOffset = null;
document.getElementById('btnGhost').onclick = (e) => {
  ghostOn = !ghostOn;
  e.target.textContent = 'Ghost: ' + (ghostOn ? 'On' : 'Off');
  if (!ghostOn) ghostRat.visible = false;
  updateGhostHud();
};
document.getElementById('btnFollow').onclick = (e) => {
  followCam = !followCam;
  e.target.textContent = 'Follow Cam: ' + (followCam ? 'On' : 'Off');
};
document.getElementById('btnSaveCam').onclick = (e) => {
  if (savedCamOffset) {
    savedCamOffset = null;
    e.target.textContent = 'Save Cam';
  } else {
    savedCamOffset = new THREE.Vector3().subVectors(camera.position, controls.target);
    e.target.textContent = '✅ Cam Saved';
  }
};
const levelEl = document.getElementById('level');
document.getElementById('btnNight').onclick = (e) => {
  nightMode = !nightMode;
  e.target.textContent = 'Night Mode: ' + (nightMode ? 'On' : 'Off');
  if (nightMode) { scene.background = new THREE.Color(0x000000); scene.environment = null; }
  else { scene.background = skybox; scene.environment = skybox; }
  cheeseMats.forEach((m) => { m.emissiveIntensity = nightMode ? 0 : CHEESE_GLOW; });
};

function setLevel(key) {
  levelKey = key;
  const L = LEVELS[key];
  CW = L.cw; CH = L.ch; par = L.par;
  levelEl.textContent = `Level: ${L.label}  ·  Par: ${L.par}s`;
  loadGhost(key);
  updateGhostHud();
  resetRace();
}
document.getElementById('btnEasy').onclick   = () => { setLevel('easy');   boardEl.style.display = 'none'; };
document.getElementById('btnMedium').onclick = () => { setLevel('medium'); boardEl.style.display = 'none'; };
document.getElementById('btnHard').onclick   = () => { setLevel('hard');   boardEl.style.display = 'none'; };

const BIN_ID = '6a2239edda38895dfe8a2178';
const BIN_KEY = '$2a$10$MR44tsNzsVDO4C/dGli.Ae0BaVkBsF2eBLrp3pc0g18WOqx2GGy.u';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const boardEl = document.getElementById('board');
const boardList = document.getElementById('boardList');
const nameInput = document.getElementById('nameInput');
const saveBtn = document.getElementById('saveBtn');
const saveMsg = document.getElementById('saveMsg');

async function loadScores() {
  try {
    const res = await fetch(BIN_URL + '/latest', { headers: { 'X-Master-Key': BIN_KEY } });
    const data = await res.json();
    return data.record || { easy: [], medium: [], hard: [] };
  } catch { return { easy: [], medium: [], hard: [] }; }
}

async function addScore(name, time, lvl) {
  const scores = await loadScores();
  if (!scores[lvl]) scores[lvl] = [];
  scores[lvl].push({ name: name.slice(0, 14), time: +time.toFixed(1), date: DAILY_SEED });
  scores[lvl].sort((a, b) => a.time - b.time);
  scores[lvl] = scores[lvl].slice(0, 50); // keep top 50 per level
  try {
    await fetch(BIN_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': BIN_KEY },
      body: JSON.stringify(scores)
    });
  } catch (e) { console.warn('save failed', e); }
}

async function renderBoard(lvl) {
  boardList.innerHTML = '<p style="color:#aaa">Loading…</p>';
  const scores = await loadScores();
  const a = (scores[lvl] || []).filter(s => s.date === DAILY_SEED).slice(0, 10);
  const label = LEVELS[lvl].label;
  boardList.innerHTML = a.length
    ? `<p style="color:#9fe">${label} — today's best times</p><ol>` + a.map((s) => `<li>${s.name} — ${s.time}s</li>`).join('') + '</ol>'
    : `<p>No times yet for <b>${label}</b> today. Be the first!</p>`;
}

document.getElementById('btnBoard').onclick = () => { renderBoard(levelKey); boardEl.style.display = 'block'; };
document.getElementById('boardClose').onclick = () => { boardEl.style.display = 'none'; };
boardEl.querySelectorAll('.lvlbtns button').forEach((b) => { b.onclick = () => renderBoard(b.dataset.lvl); });
nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveBtn.click(); });
saveBtn.onclick = async () => {
  const nm = (nameInput.value || 'Anon').trim() || 'Anon';
  saveBtn.disabled = true; nameInput.disabled = true;
  saveMsg.textContent = 'Saving…';
  await addScore(nm, raceTime, levelKey);
  saveMsg.textContent = 'Saved! See 🏆 Leaderboard to see standings.';
};

const miniCanvas = document.getElementById('minimap');
const mctx = miniCanvas.getContext('2d');
const btnMinimap = document.getElementById('btnMinimap');
function toggleMinimap() {
  minimapOn = !minimapOn;
  miniCanvas.style.display = minimapOn ? 'block' : 'none';
  btnMinimap.textContent = 'Minimap: ' + (minimapOn ? 'On (M)' : 'Off (M)');
}
btnMinimap.onclick = toggleMinimap;
function drawMinimap() {
  if (!grid) return;
  const W = miniCanvas.width, H = miniCanvas.height;
  mctx.clearRect(0, 0, W, H);
  const s = Math.min(W / GW, H / GH);
  const ox = (W - s * GW) / 2, oy = (H - s * GH) / 2;
  for (let r = 0; r < GH; r++) for (let c = 0; c < GW; c++) {
    mctx.fillStyle = grid[r][c] ? '#3a2f25' : '#2e7d32';
    mctx.fillRect(ox + c * s, oy + r * s, s + 0.5, s + 0.5);
  }
  const gateOpen = total > 0 && collected >= total;
  mctx.fillStyle = gateOpen ? '#33ff88' : '#ff5555';
  mctx.fillRect(ox + toCol(finishPos.x) * s, oy + toRow(finishPos.z) * s, s, s);
  mctx.fillStyle = '#ffd21e';
  for (const c of cheeses) {
    mctx.beginPath();
    mctx.arc(ox + (c.position.x / CELL + (GW - 1) / 2) * s + s / 2,
         oy + (c.position.z / CELL + (GH - 1) / 2) * s + s / 2,
             Math.max(1.5, s * 0.3), 0, Math.PI * 2);
    mctx.fill();
  }
  const rx = ox + (rat.position.x / CELL + (GW - 1) / 2) * s;
  const ry = oy + (rat.position.z / CELL + (GH - 1) / 2) * s;
  mctx.save(); mctx.translate(rx, ry); mctx.rotate(Math.PI - yaw);
  mctx.fillStyle = '#ffffff';
  mctx.beginPath(); mctx.moveTo(0, -s); mctx.lineTo(-s * 0.6, s * 0.7); mctx.lineTo(s * 0.6, s * 0.7);
  mctx.closePath(); mctx.fill(); mctx.restore();
}

// ============================================================
// 13. KEYBOARD
// ============================================================
const keys = {};
window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (k === 'm') toggleMinimap();
  if (k === '1') { setLevel('easy');   boardEl.style.display = 'none'; }
  if (k === '2') { setLevel('medium'); boardEl.style.display = 'none'; }
  if (k === '3') { setLevel('hard');   boardEl.style.display = 'none'; }
  if (k === 'f') document.getElementById('btnFollow').click();
  if (k === 'g') document.getElementById('btnGhost').click();
  if (k === 'n') document.getElementById('btnNight').click();
  if (k === 'l') {
    if (boardEl.style.display === 'block') boardEl.style.display = 'none';
    else { renderBoard(levelKey); boardEl.style.display = 'block'; }
  }
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
});
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

// ============================================================
// 14. RESET / NEW RACE
// ============================================================
function resetRace() {
  generateMaze();
  rat.position.copy(startPos);
  rat.rotation.y = Math.PI / 2;
  speed = 0; yaw = Math.PI / 2;
  collected = 0; raceTime = 0; finished = false; started = false;
  currentRun = [];
  ghostRat.visible = false;
  winEl.style.display = 'none';
  lastRat.copy(rat.position);
  camera.position.set(startPos.x, 18, startPos.z + 22);
  controls.target.set(startPos.x, 1.5, startPos.z);
  controls.update();
  updateHUD();
  updateGhostHud();
}

// ============================================================
// 15. RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// 16. LOOP
// ============================================================
const clock = new THREE.Clock();
let sunAngle = Math.PI / 2.3;
const dayFog = new THREE.Color(0x9bc4e2), nightFog = new THREE.Color(0x0a0f25), tmpC = new THREE.Color();
let speed = 0, yaw = 0;
let lastRat = new THREE.Vector3();
const fwd = new THREE.Vector3();

loadGhost(levelKey);
resetRace();

function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.getElapsedTime();

  const accel = 42, friction = 20, turnRate = 2.6;
  const maxSpeed = 15;
  if (keys['w'] || keys['arrowup'])   speed += accel * dt;
  else if (keys['s'] || keys['arrowdown']) speed -= accel * dt;
  else speed -= Math.sign(speed) * Math.min(Math.abs(speed), friction * dt);
  speed = THREE.MathUtils.clamp(speed, -7, maxSpeed);

  if (Math.abs(speed) > 0.3) {
    const turn = (keys['a'] || keys['arrowleft'] ? 1 : 0) - (keys['d'] || keys['arrowright'] ? 1 : 0);
    yaw += turn * turnRate * dt * Math.sign(speed === 0 ? 1 : speed);
  } else {
    yaw += ((keys['a'] || keys['arrowleft'] ? 1 : 0) - (keys['d'] || keys['arrowright'] ? 1 : 0)) * turnRate * 0.6 * dt;
  }
  rat.rotation.y = yaw;

  fwd.set(Math.sin(yaw), 0, Math.cos(yaw));
  const dx = fwd.x * speed * dt, dz = fwd.z * speed * dt;
  if (!blocked(rat.position.x + dx, rat.position.z)) rat.position.x += dx; else speed *= 0.9;
  if (!blocked(rat.position.x, rat.position.z + dz)) rat.position.z += dz; else speed *= 0.9;
  rat.position.y = 0.9 + (Math.abs(speed) > 0.5 ? Math.abs(Math.sin(t * 14)) * 0.12 : 0);

  if (!started && Math.abs(speed) > 0.5) started = true;
  if (started && !finished) { raceTime += dt; }
  if (ghostOn && started && !finished) {
    currentRun.push({ t: raceTime, x: rat.position.x, z: rat.position.z, yaw });
  }
  if (ghostOn && started) tickGhost(raceTime);

  if (followCam) {
    const camDist = 14, camHeight = 10;
    const camX = rat.position.x - Math.sin(yaw) * camDist;
    const camZ = rat.position.z - Math.cos(yaw) * camDist;
    camera.position.lerp(new THREE.Vector3(camX, camHeight, camZ), 0.08);
  } else {
    if (savedCamOffset) {
      camera.position.set(
        controls.target.x + savedCamOffset.x,
        controls.target.y + savedCamOffset.y,
        controls.target.z + savedCamOffset.z
      );
    } else {
      const mdx = rat.position.x - lastRat.x, mdz = rat.position.z - lastRat.z;
      camera.position.x += mdx; camera.position.z += mdz;
    }
  }
  controls.target.set(rat.position.x, 1.5, rat.position.z);
  lastRat.copy(rat.position);

  spot.position.set(rat.position.x, 16, rat.position.z);
  spot.target.position.copy(rat.position);

  for (let i = cheeses.length - 1; i >= 0; i--) {
    const c = cheeses[i];
    c.rotation.y += dt * 1.6;
    c.position.y = c.userData.baseY + Math.sin(t * 2 + c.userData.phase) * 0.2;
    if (c.position.distanceTo(rat.position) < 1.6) {
      scene.remove(c); cheeses.splice(i, 1); collected += 1;
    }
  }

  const gateOpen = total > 0 && collected >= total;
  if (finishGate) {
    finishGate.rotation.z += dt * 1.2;
    finishGate.material.color.set(gateOpen ? 0x33ff88 : 0xff5555);
    finishGate.material.emissive.set(gateOpen ? 0x0a5530 : 0x551414);
  }
  const nearGate = rat.position.distanceTo(finishPos) < 2.4;
  gateHint.style.display = (nearGate && !gateOpen && !finished) ? 'block' : 'none';
  if (!finished && nearGate && gateOpen) {
    finished = true;
    ghostRat.visible = false;
    gateHint.style.display = 'none';
    if (ghostOn && currentRun.length > 0) {
      if (ghostBestTime === null || raceTime < ghostBestTime) {
        ghostBestTime = raceTime;
        ghostRecording = currentRun.slice();
        saveGhost(levelKey, ghostBestTime, ghostRecording);
      }
    }
    updateGhostHud();
    const beat = raceTime <= par;
    const newBest = ghostBestTime !== null && raceTime === ghostBestTime;
    document.getElementById('winMsg').innerHTML =
      `🏁 Finished!<br><span style="font-size:15px">${LEVELS[levelKey].label} &nbsp;·&nbsp; Time: ${raceTime.toFixed(1)}s &nbsp;·&nbsp; Par: ${par}s<br>` +
      (newBest ? 'NEW BEST TIME OMG!! Ghost updated. ' : '') +
      (beat ? 'You beat the par time!' : '⏱ Just over par — try again!') + '</span>';
    nameInput.value = ''; nameInput.disabled = false; saveBtn.disabled = false; saveMsg.textContent = '';
    winEl.style.display = 'block';
  }

  updateHUD();
  if (minimapOn) drawMinimap();

  if (nightMode) {
    sun.intensity = 0; ambient.intensity = 0.05; hemi.intensity = 0.03;
    spot.angle = Math.PI / 10; spot.penumbra = 0.4;
    spot.intensity = 420;
    pointLamp.color.set(0xffe2b0);
    pointLamp.intensity = 18;
    pointLamp.distance = 14;
    pointLamp.position.set(rat.position.x, 3, rat.position.z);
    scene.fog.color.set(0x000000); scene.fog.near = 6; scene.fog.far = 30;
  } else {
    scene.fog.near = 200; scene.fog.far = 900;
    spot.angle = Math.PI / 6; spot.penumbra = 0.4; spot.distance = 70;
    pointLamp.color.set(0xffaa55);
    if (dayNightOn) sunAngle += dt * 0.12;
    sun.position.set(Math.cos(sunAngle) * 60, Math.max(8, Math.sin(sunAngle) * 60), 25);
    sun.target.position.set(rat.position.x, 0, rat.position.z);
    const daylight = Math.max(0, Math.sin(sunAngle)), night = 1 - daylight;
    sun.intensity = 0.6 + daylight * 2.4;
    sun.color.setHSL(0.09 + daylight * 0.04, 1.0, 0.45 + daylight * 0.2);
    ambient.intensity = 0.25 + daylight * 0.25;
    hemi.intensity = 0.3 + daylight * 0.5;
    pointLamp.intensity = night * 50; pointLamp.position.set(rat.position.x, 12, rat.position.z);
    spot.intensity = 50 + night * 70;
    tmpC.copy(nightFog).lerp(dayFog, daylight); scene.fog.color.copy(tmpC);
  }

  controls.update();
  renderer.render(scene, camera);
}
renderer.setAnimationLoop(animate);
</script>
